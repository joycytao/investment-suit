name: Alpaca Bot

on:
  schedule:
    # GitHub Actions cron uses UTC. During Central Daylight Time, 8:15 AM CT = 13:15 UTC.
    - cron: '15 13 * * 1-5'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI
    inputs:
      execution_duration_minutes:
        description: 'Execution window in minutes after the 8:30 AM Central start time'
        required: false
        default: '90' # Default to 90 minutes to cover the entire trading session

  pull_request:
    branches: [ main ]

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Trading Secrets
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          python - <<'PY'
          import os
          import sys

          required = ["FMP_API_KEY", "ALPACA_API_KEY", "ALPACA_SECRET_KEY"]
          missing = [name for name in required if not os.getenv(name, "").strip()]
          if missing:
              sys.exit(
                  "Missing required GitHub Actions secrets: "
                  + ", ".join(missing)
              )

          print("Trading secrets are configured.")
          PY

      - name: Run Sniper Agent
        env:
          # Inject GitHub Secrets into Python environment variables
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          EXECUTION_DURATION_MINUTES: ${{ github.event.inputs.execution_duration_minutes || '60' }}
        run: python scripts/trading_agent.py
  
  diagnose-failure: 
    runs-on: ubuntu-latest
    needs: trade
    if: failure() 
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Invoke Repair Agent on Failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          gh agent run .github/prompts/repair-agent.prompt.md

  auto-review-and-merge:
    if: contains(github.event.comment.body, '/request-audit')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Execute Review Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: 
          # Explicitly tell gh to use the token for this session
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          gh agent run .github/prompts/review-agent.prompt.md
      
      - name: Finalize Merge
        if: contains(github.event.comment.body, '/approve-and-merge')
        run: gh pr merge --auto --squash --delete-branch
