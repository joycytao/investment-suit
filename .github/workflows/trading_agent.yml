name: Alpaca Bot

on:
  schedule:
    # Using Cron syntax here. US Eastern Time 09:30 AM = UTC 13:30 (Daylight Saving Time)
    # Recommended to set at 13:31 UTC, run Monday through Friday
    - cron: '31 13 * * 1-5'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

  pull_request:
    branches: [ main ]

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Sniper Agent
        env:
          # Inject GitHub Secrets into Python environment variables
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python trading_agent.py
  
  diagnose-failure: 
    runs-on: ubuntu-latest
    needs: trade
    if: failure() 
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Invoke Repair Agent on Failure
        run: gh agent run .github/workflows/repair_agent.md

  auto-review-and-merge:
    if: contains(github.event.comment.body, '/request-audit')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      reviews: write
    steps:
      - name: Execute Review Agent
        run: gh agent run .github/workflows/review_agent.md
      
      - name: Finalize Merge
        if: contains(github.event.comment.body, '/approve-and-merge')
        run: gh pr merge --auto --squash --delete-branch
